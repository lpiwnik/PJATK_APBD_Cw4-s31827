name: Build and Push Multi-Platform Image

on:
  push:
    branches: [ "main" ]

# Dodajemy zmienną środowiskową, aby wyciszyć ostrzeżenia o Node.js 20
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Konfiguracja QEMU (pozwala budować na arm64, np. dla Mac M1/M2)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Konfiguracja Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Logowanie do Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Budowanie i wypychanie obrazu
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          # Context: Wskazujemy folder z kodem źródłowym (tam gdzie sln/csproj)
          context: ./ComputerInventoryAPI
          # File: Dokładna ścieżka do Dockerfile
          file: ./ComputerInventoryAPI/Dockerfile
          push: true
          # Budujemy na obie architektury
          platforms: linux/amd64,linux/arm64
          tags: lpiwnik/computer-inventory-api:latest
